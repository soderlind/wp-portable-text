name: Manually Build release zip

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
        default: ''

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    env:
      PLUGIN_ZIP: wp-portable-text.zip
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Install Composer (autoloader only)
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Archive Release
        uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 #0.7.6
        with:
          type: 'zip'
          filename: ${{ env.PLUGIN_ZIP }}
          exclusions: >-
            *.git* /*.github/* /*.vscode/* /*node_modules/* /*tests/* /*docs/* /*scripts/* /*src/*
            composer.json composer.lock package.json package-lock.json
            phpunit.xml phpunit.xml.dist phpcs.xml tsconfig.json webpack.config.js
            .editorconfig .eslintignore .phpunit.result.cache .eslintrc.js .gitignore .gitattributes
            *.log CHANGELOG.md README.md
            !build/* !includes/* !templates/* !vendor/*

      - name: Verify Archive Contents
        run: |
          echo "Listing $PLUGIN_ZIP entries:"
          unzip -l "$PLUGIN_ZIP" || { echo "Failed to list zip contents"; exit 1; }
          echo "Total files: $(unzip -l "$PLUGIN_ZIP" | awk 'END{print $2}')"

          if unzip -l "$PLUGIN_ZIP" | grep -q "build/editor/index.js"; then
            echo "Built JS bundle is included"
          else
            echo "ERROR: build/editor/index.js is missing from the release"
            exit 1
          fi

          if unzip -l "$PLUGIN_ZIP" | grep -q "includes/Renderer.php"; then
            echo "PHP includes are present"
          else
            echo "ERROR: includes/Renderer.php is missing from the release"
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda #v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.PLUGIN_ZIP }}
          tag_name: ${{ github.event.inputs.tag }}
